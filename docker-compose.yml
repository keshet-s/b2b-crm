version: "3.9"

# Local development compose file.
# For production, use: docker compose -f docker-compose.yml -f docker-compose.prod.yml up -d

volumes:
  crm_data:
    driver: local
    driver_opts:
      type: none
      o: bind
      device: ./data

services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    image: b2b-crm-backend:dev
    volumes:
      - ./backend:/app          # hot-reload: source changes reflected immediately
      - ./data:/data            # persistent SQLite database
      - ./backend/prompts:/app/prompts:ro  # prompts are read-only at runtime
    ports:
      - "8000:8000"
    env_file:
      - .env
    restart: on-failure
    command: uvicorn main:app --reload --host 0.0.0.0 --port 8000
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/health')"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    image: b2b-crm-frontend:dev
    volumes:
      - ./frontend:/app         # hot-reload: source changes reflected immediately
    ports:
      - "8501:8501"
    env_file:
      - .env
    depends_on:
      backend:
        condition: service_healthy
    restart: on-failure
    command: >
      streamlit run app.py
      --server.port 8501
      --server.address 0.0.0.0
      --server.headless true
    environment:
      # Tell the frontend where the backend API lives inside the Docker network
      - BACKEND_URL=http://backend:8000
